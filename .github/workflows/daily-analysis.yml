name: 每日A股分析

on:
  schedule:
    # 每个工作日北京时间 18:00 (UTC 10:00) 自动执行
    - cron: "0 10 * * 1-5"
  workflow_dispatch:
    inputs:
      ticker:
        description: "股票代码（留空则分析 STOCK_LIST 全部）"
        required: false
        default: ""
        type: string

concurrency:
  group: daily-stock-analysis
  cancel-in-progress: false

env:
  PYTHONUNBUFFERED: "1"

jobs:
  analyze:
    name: 📊 A股智能分析
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: 🎲 随机延迟（避免固定时间访问数据源）
        run: sleep $((RANDOM % 60))

      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: 📁 Create directories
        run: mkdir -p results

      - name: 🔧 Show configuration
        run: |
          echo "=========================================="
          echo "📋 TradingAgents-Astock 配置"
          echo "=========================================="
          echo "🤖 LLM Provider : ${LLM_PROVIDER:-deepseek}"
          echo "🧠 Deep Think   : ${DEEP_THINK_LLM:-deepseek-v4-pro}"
          echo "⚡ Quick Think  : ${QUICK_THINK_LLM:-deepseek-v4-flash}"
          echo "📊 Stock List   : ${STOCK_LIST:-600519,000858,300750}"
          echo "💬 Language     : ${OUTPUT_LANGUAGE:-Chinese}"
          echo ""
          echo "🔑 API Keys:"
          echo "  MINIMAX_API_KEY    : $([ -n "$MINIMAX_API_KEY" ] && echo '✅' || echo '⚪ 未配置')"
          echo "  OPENAI_API_KEY     : $([ -n "$OPENAI_API_KEY" ] && echo '✅' || echo '⚪ 未配置')"
          echo "  ANTHROPIC_API_KEY  : $([ -n "$ANTHROPIC_API_KEY" ] && echo '✅' || echo '⚪ 未配置')"
          echo "  DEEPSEEK_API_KEY   : $([ -n "$DEEPSEEK_API_KEY" ] && echo '✅' || echo '⚪ 未配置')"
          echo "  GEMINI_API_KEY     : $([ -n "$GEMINI_API_KEY" ] && echo '✅' || echo '⚪ 未配置')"
          echo "=========================================="
        env:
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: 🚀 Run batch analysis
        id: analysis
        env:
          # LLM API Keys
          MINIMAX_API_KEY: ${{ secrets.MINIMAX_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

          # LLM Configuration
          LLM_PROVIDER: ${{ vars.LLM_PROVIDER || 'deepseek' }}
          DEEP_THINK_LLM: ${{ vars.DEEP_THINK_LLM || 'deepseek-v4-pro' }}
          QUICK_THINK_LLM: ${{ vars.QUICK_THINK_LLM || 'deepseek-v4-flash' }}
          BACKEND_URL: ${{ vars.BACKEND_URL || '' }}

          # Stock configuration
          STOCK_LIST: ${{ github.event.inputs.ticker || vars.STOCK_LIST || '600519,000858,300750' }}
          TRADE_DATE: ${{ vars.TRADE_DATE || '' }}

          # Analysis settings
          MAX_DEBATE_ROUNDS: ${{ vars.MAX_DEBATE_ROUNDS || '1' }}
          MAX_RISK_DISCUSS_ROUNDS: ${{ vars.MAX_RISK_DISCUSS_ROUNDS || '1' }}
          OUTPUT_LANGUAGE: ${{ vars.OUTPUT_LANGUAGE || 'Chinese' }}

          # Results directory
          TRADINGAGENTS_RESULTS_DIR: ${{ github.workspace }}/results
        run: python .github/scripts/batch_runner.py

      - name: 📤 Upload analysis reports
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: analysis-reports-${{ github.run_number }}
          path: |
            results/
          retention-days: 30

      - name: 📢 Send notification (optional)
        if: always()
        run: |
          if [ -n "$WECHAT_WEBHOOK_URL" ]; then
            echo "📢 Sending WeChat notification..."
            python -c "
          import json, os, urllib.request
          url = os.environ['WECHAT_WEBHOOK_URL']
          data = json.dumps({'msgtype': 'text', 'text': {'content': 'TradingAgents 每日分析已完成'}}).encode()
          req = urllib.request.Request(url, data=data, headers={'Content-Type': 'application/json'})
          urllib.request.urlopen(req)
          print('✅ Notification sent')
          " || echo "⚠️ Notification failed (non-critical)"
          fi
        env:
          WECHAT_WEBHOOK_URL: ${{ secrets.WECHAT_WEBHOOK_URL }}
