name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: 🧪 Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[google]"
          pip install pytest pytest-cov

      - name: 🔍 Lint with ruff
        run: |
          pip install ruff
          ruff check tradingagents/ cli/ web/ --output-format=github || true

      - name: ✅ Run unit tests
        run: |
          python -m pytest tests/ -v -m "unit or not (integration)" \
            --tb=short \
            --timeout=60 \
            -p no:warnings

      - name: 📊 Coverage report
        run: |
          pip install pytest-cov
          python -m pytest tests/ -v -m "unit or not (integration)" \
            --cov=tradingagents \
            --cov-report=term-missing \
            --cov-report=xml \
            --tb=short \
            -p no:warnings \
            || true

      - name: 📤 Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  lint:
    name: 📝 Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[google]"
          pip install ruff

      - name: 🔍 Ruff check
        run: ruff check tradingagents/ cli/ web/ --output-format=github

      - name: 🔍 Ruff format check
        run: ruff format --check tradingagents/ cli/ web/

  build:
    name: 📦 Build Verification
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v5

      - name: 🐍 Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: 📦 Install build tools
        run: pip install build

      - name: 🏗️ Build package
        run: python -m build

      - name: ✅ Verify package
        run: |
          pip install dist/*.whl
          python -c "from tradingagents.default_config import DEFAULT_CONFIG; print('✅ Package OK')"
